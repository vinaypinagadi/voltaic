version: '3.8'

services:
  db:
    image: pgvector/pgvector:16-pgdg
    container_name: voltaic-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "54322:5432"
    volumes:
      # Automatically run schema migrations and setup HNSW indexes on DB spin-up
      - ./supabase/migrations/20260706000000_init_schema.sql:/docker-entrypoint-initdb.d/01-init_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voltaic-backend
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=https://xukqjrntzlvfhhvjfbwm.supabase.co
      - SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1a3Fqcm50emx2ZmhodmpmYndtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDg3MDcsImV4cCI6MjA5ODkyNDcwN30.8wzaamfmSYnCPAYc-oIJ98W5rID0r5SVFnKLBCC782g
      - SUPABASE_SERVICE_ROLE_KEY=mock-service-role-key
      # Shared JWT Secret matching auth validation requirements
      - SUPABASE_JWT_SECRET=mock-jwt-secret-key-at-least-32-chars-long-for-security
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voltaic-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
